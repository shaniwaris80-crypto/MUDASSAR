<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taxi Fleet Cloud Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">
  <div id="toast" class="toast hidden"></div>

  <!-- AUTH -->
  <section id="authView" class="auth-shell">
    <div class="auth-card">
      <div class="badge">Cloud</div>
      <h1>TAXI FLEET CLOUD MANAGER</h1>
      <p class="muted">Day mode default • Night mode optional</p>

      <div class="auth-tabs">
        <button id="loginTabBtn" class="tab-btn active" type="button">Login</button>
        <button id="registerTabBtn" class="tab-btn" type="button">Register</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label>
          <span>Email</span>
          <input id="loginEmail" type="email" required />
        </label>
        <label>
          <span>Password</span>
          <input id="loginPassword" type="password" required />
        </label>
        <button class="primary-btn full" type="submit">Sign in</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <label>
          <span>Full name</span>
          <input id="registerFullName" type="text" required />
        </label>
        <label>
          <span>Phone</span>
          <input id="registerPhone" type="text" />
        </label>
        <label>
          <span>Email</span>
          <input id="registerEmail" type="email" required />
        </label>
        <label>
          <span>Password</span>
          <input id="registerPassword" type="password" minlength="6" required />
        </label>
        <label>
          <span>Role</span>
          <select id="registerRole" required>
            <option value="driver">Driver</option>
            <option value="manager">Manager</option>
          </select>
        </label>
        <button class="primary-btn full" type="submit">Create account</button>
      </form>
    </div>
  </section>

  <!-- APP -->
  <section id="appView" class="app-shell hidden">
    <aside class="sidebar">
      <div>
        <div class="badge">Live</div>
        <h2>Fleet Manager</h2>
        <p class="muted">Cloud dashboard</p>
      </div>

      <div class="profile-box">
        <div class="avatar" id="sidebarAvatar">U</div>
        <div>
          <div id="sidebarName" class="profile-name">User</div>
          <div id="sidebarRole" class="profile-role">role</div>
        </div>
      </div>

      <nav class="nav-list">
        <button class="nav-btn active" data-view="dashboardView">Dashboard</button>
        <button class="nav-btn" data-view="shiftView">New Shift</button>
        <button class="nav-btn" data-view="shiftsView">Shift History</button>
        <button class="nav-btn" data-view="reportsView">Reports</button>
        <button class="nav-btn" data-view="profilesView">Profiles</button>
      </nav>

      <div class="sidebar-actions">
        <button id="themeToggleBtn" class="secondary-btn full" type="button">Night mode</button>
        <button id="logoutBtn" class="secondary-btn full" type="button">Logout</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle" class="muted">Realtime totals</p>
        </div>
        <div id="topbarDate" class="date-pill"></div>
      </header>

      <!-- DASHBOARD -->
      <section id="dashboardView" class="view">
        <div id="dashboardStats" class="stats-grid"></div>

        <div class="two-col">
          <div class="card">
            <h3>Today payment sources</h3>
            <div id="todaySources" class="stats-grid compact"></div>
          </div>

          <div class="card">
            <h3>Top drivers</h3>
            <div id="topDrivers" class="stack-list"></div>
          </div>
        </div>
      </section>

      <!-- NEW SHIFT -->
      <section id="shiftView" class="view hidden">
        <div class="two-col">
          <form id="shiftForm" class="card form-card">
            <h3>New Shift</h3>

            <div class="grid-3">
              <label>
                <span>Date</span>
                <input id="sfDate" type="date" required />
              </label>

              <label id="driverSelectWrap" class="hidden">
                <span>Driver</span>
                <select id="sfDriverId"></select>
              </label>

              <label>
                <span>Vehicle</span>
                <input id="sfVehicle" type="text" placeholder="Taxi / plate" />
              </label>
            </div>

            <div class="grid-4">
              <label>
                <span>Start time</span>
                <input id="sfStartTime" type="time" required />
              </label>
              <label>
                <span>End time</span>
                <input id="sfEndTime" type="time" required />
              </label>
              <label>
                <span>Start mileage</span>
                <input id="sfStartMileage" type="number" step="0.1" min="0" required />
              </label>
              <label>
                <span>End mileage</span>
                <input id="sfEndMileage" type="number" step="0.1" min="0" required />
              </label>
            </div>

            <div class="divider"></div>

            <div class="grid-4">
              <label>
                <span>Cash</span>
                <input id="sfCash" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Card</span>
                <input id="sfCard" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Free Now</span>
                <input id="sfFreeNow" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Uber</span>
                <input id="sfUber" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Bolt</span>
                <input id="sfBolt" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Other apps</span>
                <input id="sfOtherApps" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Other income</span>
                <input id="sfOtherIncome" type="number" step="0.01" min="0" value="0" />
              </label>
            </div>

            <div class="divider"></div>

            <div class="grid-4">
              <label>
                <span>Fuel expense total</span>
                <input id="sfFuelExpenseTotal" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Fuel split mode</span>
                <select id="sfFuelSplitMode">
                  <option value="FULL">Full</option>
                  <option value="DIVIDE_BY_2">Divide by 2</option>
                  <option value="DIVIDE_BY_3">Divide by 3</option>
                </select>
              </label>
              <label>
                <span>Cleaning</span>
                <input id="sfCleaningExpense" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Parking</span>
                <input id="sfParkingExpense" type="number" step="0.01" min="0" value="0" />
              </label>
              <label>
                <span>Other expenses</span>
                <input id="sfOtherExpenses" type="number" step="0.01" min="0" value="0" />
              </label>
            </div>

            <label>
              <span>Notes</span>
              <textarea id="sfNotes" rows="3"></textarea>
            </label>

            <div class="actions">
              <button class="primary-btn" type="submit">Save shift</button>
              <button id="resetShiftBtn" class="secondary-btn" type="button">Reset</button>
            </div>
          </form>

          <div class="card">
            <h3>Live calculation</h3>
            <div id="shiftPreview" class="stats-grid compact"></div>
          </div>
        </div>
      </section>

      <!-- SHIFTS -->
      <section id="shiftsView" class="view hidden">
        <div class="card">
          <h3>Shift history</h3>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Driver</th>
                  <th>Hours</th>
                  <th>KM</th>
                  <th>Revenue</th>
                  <th>Expenses</th>
                  <th>Net</th>
                </tr>
              </thead>
              <tbody id="shiftsTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- REPORTS -->
      <section id="reportsView" class="view hidden">
        <div class="card">
          <h3>Reports</h3>
          <div class="grid-4">
            <label>
              <span>Range</span>
              <select id="reportRange">
                <option value="today">Today</option>
                <option value="week">This week</option>
                <option value="month" selected>This month</option>
                <option value="year">This year</option>
                <option value="all">All</option>
              </select>
            </label>

            <label id="reportDriverWrap">
              <span>Driver</span>
              <select id="reportDriverFilter">
                <option value="all">All</option>
              </select>
            </label>
          </div>
        </div>

        <div id="reportStats" class="stats-grid"></div>
      </section>

      <!-- PROFILES -->
      <section id="profilesView" class="view hidden">
        <div id="profilesStats" class="stats-grid compact"></div>
        <div id="profilesList" class="cards-grid"></div>
      </section>
    </main>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
